name: ci
on:
  pull_request:
  push:
jobs:
  rust:
    name: rust (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo fmt --all -- --check
        working-directory: repo
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: repo
      # Both feature configurations must build: default (transport-free) and
      # all-features (orch-driver's grpc adapter).
      - run: cargo build --workspace
        working-directory: repo
      - run: cargo test -p orch-core core_validation
        working-directory: repo
      - run: cargo test --workspace --all-features
        working-directory: repo
      # Determinism gate: same seed twice must be bit-identical (tree +
      # event-sequence hashes) on both matrix arms.
      - run: cargo test -p orch-server --test seed_gate
        working-directory: repo
  # Tier-2 true-SIGKILL chaos smoke (plan D-T5): reduced matrix — 1 seed,
  # 3 lattice points, both torn-write kinds, 2 random kills, the served-gRPC
  # resume smoke, and the negative control. Every mechanism exercised on
  # every push; the full matrix is the evidence lane
  # (scripts/evidence-tier2.sh). Separate job so its runtime stays visible
  # and its failure names itself.
  tier2-chaos-smoke:
    name: tier2-chaos-smoke (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p orchestratord --test tier2_chaos -- --nocapture
        working-directory: repo
        env:
          TIER2_ENABLE: "1"
