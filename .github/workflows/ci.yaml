name: ci
on:
  pull_request:
  push:
jobs:
  rust:
    name: rust (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo fmt --all -- --check
        working-directory: repo
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: repo
      # Both feature configurations must build: default (transport-free) and
      # all-features (orch-driver's grpc adapter).
      - run: cargo build --workspace
        working-directory: repo
      - run: cargo test -p orch-core core_validation
        working-directory: repo
      - run: cargo test --workspace --all-features
        working-directory: repo
      # Determinism gate: same seed twice must be bit-identical (tree +
      # event-sequence hashes) on both matrix arms.
      - run: cargo test -p orch-server --test seed_gate
        working-directory: repo
